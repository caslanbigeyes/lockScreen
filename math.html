<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>解锁验证</title>
    <style>
      body {
        margin: 0;
        background: #0f1115;
        color: #e6e8ef;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        background: #181b22;
        border-radius: 16px;
        padding: 28px;
        width: 520px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        text-align: center;
      }
      .title {
        font-size: 22px;
        margin-bottom: 12px;
      }
      .countdown {
        font-size: 18px;
        color: #ff6b6b;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .countdown.warn {
        animation: blink 0.5s infinite alternate;
      }
      @keyframes blink {
        from { opacity: 1; }
        to { opacity: 0.4; }
      }
      .level-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 13px;
        margin-bottom: 12px;
        background: #2b2f3a;
        color: #9aa3b2;
      }
      .problem {
        font-size: 32px;
        font-weight: 700;
        margin: 16px 0;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #2b2f3a;
        color: #e6e8ef;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        width: 100%;
        padding: 12px 16px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: #3d7eff;
        color: #fff;
      }
      .tip {
        margin-top: 12px;
        font-size: 13px;
        color: #7f8897;
      }
      .result {
        margin-top: 12px;
        font-size: 14px;
        color: #ff6b6b;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">请输入结果以继续使用电脑</div>
      <div class="countdown" id="countdown">剩余时间：20 秒</div>
      <div class="level-badge" id="levelBadge">Level 1</div>
      <div class="problem" id="problem">0 + 0 = ?</div>
      <input id="answer" type="number" placeholder="输入答案" />
      <button id="submit">确认</button>
      <div class="result" id="result"></div>
      <div class="tip">正确后关闭此窗口并继续专注<br>答错或超时将重新锁屏</div>
    </div>
    <script src="math.js"></script>
  </body>
</html>
