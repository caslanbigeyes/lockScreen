<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>FocusGuard 周报</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        padding: 40px;
        color: #1a1a1a;
        font-size: 14px;
        line-height: 1.6;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
        color: #111;
      }
      .subtitle {
        color: #666;
        margin-bottom: 32px;
        font-size: 14px;
      }
      .section {
        margin-bottom: 28px;
      }
      .section h2 {
        font-size: 16px;
        color: #333;
        border-bottom: 2px solid #3d7eff;
        padding-bottom: 6px;
        margin-bottom: 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 16px;
      }
      th, td {
        padding: 8px 12px;
        text-align: center;
        border: 1px solid #ddd;
        font-size: 13px;
      }
      th {
        background: #f5f7fa;
        font-weight: 600;
        color: #333;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }
      .summary-item {
        background: #f5f7fa;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
      }
      .summary-item .value {
        font-size: 28px;
        font-weight: 700;
        color: #3d7eff;
      }
      .summary-item .label {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }
      .behavior-tag {
        display: inline-block;
        padding: 4px 16px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 600;
        margin-top: 8px;
      }
      .behavior-normal { background: #dcfce7; color: #166534; }
      .behavior-impulse { background: #fee2e2; color: #991b1b; }
      .behavior-resist { background: #fef3c7; color: #92400e; }
      .behavior-fake { background: #dbeafe; color: #1e40af; }
      .footer {
        margin-top: 40px;
        text-align: center;
        color: #999;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>FocusGuard 周报</h1>
    <div class="subtitle" id="dateRange"></div>

    <div class="section">
      <h2>周概览</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="value" id="rScore">0</div>
          <div class="label">综合拖延指数</div>
        </div>
        <div class="summary-item">
          <div class="value" id="rSessions">0</div>
          <div class="label">总专注次数</div>
        </div>
        <div class="summary-item">
          <div class="value" id="rTotalMin">0</div>
          <div class="label">总专注时长(分)</div>
        </div>
      </div>
      <div style="text-align:center">
        行为模式：<span class="behavior-tag" id="rBehavior">--</span>
      </div>
    </div>

    <div class="section">
      <h2>每日详细数据</h2>
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>解锁</th>
            <th>强制锁屏</th>
            <th>答题错误</th>
            <th>快速解锁</th>
            <th>专注次数</th>
            <th>专注(分)</th>
            <th>拖延分</th>
          </tr>
        </thead>
        <tbody id="rTableBody"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>行为模式分析</h2>
      <div id="rAnalysis"></div>
    </div>

    <div class="footer">
      由 FocusGuard 自动生成 · <span id="rGenDate"></span>
    </div>

    <script>
      // 由主进程注入数据后调用
      window.fillReport = (data) => {
        const { stats, weightedScore, behavior, days } = data;

        // 日期范围
        document.getElementById("dateRange").textContent =
          `${days[0]} ~ ${days[days.length - 1]}`;

        // 概览数据
        let totalSessions = 0;
        let totalFocusMs = 0;
        days.forEach(k => {
          const d = stats[k] || {};
          totalSessions += d.focusSessions || 0;
          totalFocusMs += d.totalFocusMs || 0;
        });

        document.getElementById("rScore").textContent = String(weightedScore);
        document.getElementById("rSessions").textContent = String(totalSessions);
        document.getElementById("rTotalMin").textContent = String(Math.round(totalFocusMs / 60000));

        // 行为模式
        const bEl = document.getElementById("rBehavior");
        bEl.textContent = behavior;
        const bMap = {
          "正常型": "behavior-normal",
          "冲动型": "behavior-impulse",
          "抗拒型": "behavior-resist",
          "假专注型": "behavior-fake"
        };
        bEl.className = `behavior-tag ${bMap[behavior] || ""}`;

        // 表格
        const tbody = document.getElementById("rTableBody");
        days.forEach(k => {
          const d = stats[k] || {};
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${k}</td>
            <td>${d.unlockCount || 0}</td>
            <td>${d.forcedLockCount || 0}</td>
            <td>${d.mathErrorCount || 0}</td>
            <td>${d.quickUnlockCount || 0}</td>
            <td>${d.focusSessions || 0}</td>
            <td>${Math.round((d.totalFocusMs || 0) / 60000)}</td>
            <td>${d.delayScore || 0}</td>
          `;
          tbody.appendChild(tr);
        });

        // 分析文本
        const analysis = document.getElementById("rAnalysis");
        let text = "";
        if (behavior === "冲动型") {
          text = "本周解锁频率较高且平均专注时间不足10分钟，建议逐步延长专注时长，减少中途查看手机/电脑的冲动。";
        } else if (behavior === "抗拒型") {
          text = "本周数学题错误率较高且强制锁屏次数多，建议调整心态，把锁屏视为休息提醒而非惩罚。";
        } else if (behavior === "假专注型") {
          text = "本周专注次数多但总时长不够，可能存在频繁开启又中断的情况，建议选择一个合适的时长坚持完成。";
        } else {
          text = "本周专注表现良好，继续保持当前节奏。建议持续关注拖延指数趋势，保持稳定。";
        }
        analysis.textContent = text;

        document.getElementById("rGenDate").textContent = new Date().toLocaleDateString("zh-CN");
      };
    </script>
  </body>
</html>
