<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusGuard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #e6e8ef;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* 许可证状态横幅 */
      .license-banner {
        padding: 8px 16px;
        font-size: 13px;
        text-align: center;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .license-banner.trial {
        background: #1b2a3a;
        color: #60a5fa;
        border-bottom: 1px solid #2a3f5f;
      }
      .license-banner.active {
        background: #1b3a2d;
        color: #4ade80;
        border-bottom: 1px solid #2a5f3f;
      }
      .license-banner.expired {
        background: #3a1b1b;
        color: #f87171;
        border-bottom: 1px solid #5f2a2a;
      }
      .license-banner .banner-action {
        background: none;
        border: 1px solid currentColor;
        color: inherit;
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.85;
      }
      .license-banner .banner-action:hover { opacity: 1; }

      /* Tab 导航 */
      .tab-nav {
        display: flex;
        background: #181b22;
        border-bottom: 1px solid #2b2f3a;
        flex-shrink: 0;
      }
      .tab-nav button {
        flex: 1;
        padding: 14px 0;
        background: transparent;
        border: none;
        color: #7f8897;
        font-size: 14px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab-nav button.active {
        color: #3d7eff;
        border-bottom-color: #3d7eff;
      }
      .tab-nav button:hover {
        color: #e6e8ef;
      }

      /* Tab 内容 */
      .tab-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* 专注 Tab */
      .focus-panel {
        text-align: center;
        padding-top: 20px;
      }
      .focus-panel .title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .focus-panel .status {
        font-size: 15px;
        color: #9aa3b2;
        margin-bottom: 16px;
      }
      .focus-panel .timer {
        font-size: 56px;
        font-weight: 700;
        margin: 12px 0 20px;
        font-variant-numeric: tabular-nums;
      }
      .focus-panel .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .focus-panel .hint {
        margin-top: 20px;
        font-size: 13px;
        color: #7f8897;
        line-height: 1.6;
      }

      /* 统计 Tab */
      .stats-panel .overview {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 16px;
      }
      .stats-panel .stat-card {
        background: #181b22;
        border-radius: 10px;
        padding: 14px;
        text-align: center;
      }
      .stat-card .value {
        font-size: 24px;
        font-weight: 700;
      }
      .stat-card .label {
        font-size: 12px;
        color: #7f8897;
        margin-top: 4px;
      }
      .stats-panel .score-section {
        background: #181b22;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
      }
      .score-section .big-score {
        font-size: 48px;
        font-weight: 800;
      }
      .score-section .score-label {
        font-size: 13px;
        color: #7f8897;
        margin-top: 4px;
      }
      .behavior-badge {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 16px;
        font-size: 13px;
        font-weight: 600;
        margin-top: 8px;
      }
      .b-normal { background: #1b3a2d; color: #4ade80; }
      .b-impulse { background: #3a1b1b; color: #f87171; }
      .b-resist { background: #3a2e1b; color: #fbbf24; }
      .b-fake { background: #1b2a3a; color: #60a5fa; }
      .b-nodata { background: #2b2f3a; color: #9aa3b2; }

      /* 设置 Tab */
      .settings-panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #181b22;
        border-radius: 10px;
        padding: 12px 16px;
      }
      .setting-row .setting-label {
        font-size: 14px;
      }
      .setting-row select,
      .setting-row input[type="text"],
      .setting-row input[type="password"] {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: #2b2f3a;
        color: #e6e8ef;
        font-size: 14px;
        width: 200px;
      }
      .setting-row input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }
      .setting-row.pro-locked {
        opacity: 0.5;
        pointer-events: none;
      }
      .setting-group-title {
        font-size: 13px;
        color: #7f8897;
        margin-top: 6px;
      }

      /* 通用按钮 */
      .btn {
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.85; }
      .btn-primary { background: #3d7eff; color: #fff; }
      .btn-secondary { background: #2b2f3a; color: #e6e8ef; }
      .btn-danger { background: #dc2626; color: #fff; }
      .btn-action {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        cursor: pointer;
        background: #2b2f3a;
        color: #e6e8ef;
        transition: background 0.2s;
        position: relative;
      }
      .btn-action:hover { background: #353a47; }
      .btn-action.primary { background: #3d7eff; color: #fff; }

      /* PRO badge */
      .pro-badge {
        display: inline-block;
        background: linear-gradient(135deg, #f59e0b, #f97316);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 6px;
        vertical-align: middle;
        letter-spacing: 0.5px;
      }

      /* 许可证设置区域 */
      .license-section {
        background: #181b22;
        border-radius: 10px;
        padding: 16px;
      }
      .license-section .license-status-text {
        font-size: 14px;
        margin-bottom: 12px;
      }
      .license-row {
        display: flex;
        gap: 8px;
      }
      .license-row input {
        flex: 1;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        background: #2b2f3a;
        color: #e6e8ef;
        font-size: 14px;
      }
      .license-active-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .license-active-info .key-display {
        font-size: 14px;
        color: #4ade80;
        font-family: monospace;
      }
      .license-feedback {
        font-size: 13px;
        margin-top: 8px;
        min-height: 18px;
      }
      .license-feedback.success { color: #4ade80; }
      .license-feedback.error { color: #f87171; }
      .license-feedback.loading { color: #60a5fa; }

      /* Pro 弹窗 */
      .pro-modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .pro-modal-overlay.visible {
        display: flex;
      }
      .pro-modal {
        background: #1a1d25;
        border-radius: 16px;
        padding: 32px;
        text-align: center;
        max-width: 360px;
        width: 90%;
        border: 1px solid #2b2f3a;
      }
      .pro-modal .pro-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .pro-modal .pro-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .pro-modal .pro-feature-name {
        font-size: 14px;
        color: #9aa3b2;
        margin-bottom: 20px;
      }
      .pro-modal .pro-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <!-- 许可证状态横幅 -->
    <div class="license-banner trial" id="licenseBanner">
      <span id="bannerText">加载中...</span>
      <button class="banner-action" id="bannerAction" style="display:none;">升级 Pro</button>
    </div>

    <!-- Tab 导航 -->
    <div class="tab-nav">
      <button class="active" data-tab="focus">专注</button>
      <button data-tab="stats">统计</button>
      <button data-tab="settings">设置</button>
    </div>

    <!-- 专注 Tab -->
    <div class="tab-content">
      <div class="tab-panel active" id="tab-focus">
        <div class="focus-panel">
          <div class="title">FocusGuard</div>
          <div class="status" id="statusText">等待开始</div>
          <div class="timer" id="timerText">01:00</div>
          <div class="actions">
            <button class="btn btn-primary" id="startBtn">开始专注</button>
            <button class="btn btn-secondary" id="stopBtn">停止</button>
          </div>
          <div class="hint" id="hintText">
            到点后锁屏（约5分钟），解锁后需答题继续
          </div>
        </div>
      </div>

      <!-- 统计 Tab -->
      <div class="tab-panel" id="tab-stats">
        <div class="stats-panel">
          <div class="score-section">
            <div class="big-score" id="scoreValue">0</div>
            <div class="score-label">7 天综合拖延指数</div>
            <div class="behavior-badge b-nodata" id="behaviorTag">数据不足</div>
          </div>
          <div class="overview">
            <div class="stat-card">
              <div class="value" id="statUnlock">0</div>
              <div class="label">解锁次数</div>
            </div>
            <div class="stat-card">
              <div class="value" id="statForced">0</div>
              <div class="label">强制锁屏</div>
            </div>
            <div class="stat-card">
              <div class="value" id="statDelay">0</div>
              <div class="label">拖延评分</div>
            </div>
            <div class="stat-card">
              <div class="value" id="statMathErr">0</div>
              <div class="label">答题错误</div>
            </div>
            <div class="stat-card">
              <div class="value" id="statSessions">0</div>
              <div class="label">专注次数</div>
            </div>
            <div class="stat-card">
              <div class="value" id="statFocusMin">0</div>
              <div class="label">专注(分)</div>
            </div>
          </div>
          <button class="btn-action" id="openDetailStats">查看详细统计图表<span class="pro-badge">PRO</span></button>
          <button class="btn-action" id="refreshStats">刷新统计</button>
        </div>
      </div>

      <!-- 设置 Tab -->
      <div class="tab-panel" id="tab-settings">
        <div class="settings-panel">
          <div class="setting-group-title">基础设置</div>
          <div class="setting-row">
            <span class="setting-label">专注时长</span>
            <select id="focusMinutes">
              <option value="1">1 分钟</option>
              <option value="25">25 分钟</option>
              <option value="40">40 分钟</option>
              <option value="60">60 分钟</option>
            </select>
          </div>
          <div class="setting-row" id="captureRow">
            <span class="setting-label">随机拍照<span class="pro-badge" id="captureBadge" style="display:none;">PRO</span></span>
            <input type="checkbox" id="captureEnabled" checked />
          </div>
          <div class="setting-row" id="mathRow">
            <span class="setting-label">解锁需答题<span class="pro-badge" id="mathBadge" style="display:none;">PRO</span></span>
            <input type="checkbox" id="mathGateEnabled" checked />
          </div>

          <div class="setting-group-title">API 同步（可选）</div>
          <div class="setting-row">
            <span class="setting-label">API 地址</span>
            <input type="text" id="apiBase" placeholder="https://your-api.example.com" />
          </div>
          <div class="setting-row">
            <span class="setting-label">API 令牌</span>
            <input type="password" id="apiToken" placeholder="Bearer Token" />
          </div>

          <div class="setting-group-title">许可证</div>
          <div class="license-section" id="licenseSection">
            <div class="license-status-text" id="licenseStatusText">加载中...</div>
            <!-- 未激活时：显示输入+激活按钮 -->
            <div id="licenseActivateArea">
              <div class="license-help-text" style="font-size:12px;color:#7f8897;margin-bottom:10px;">
                购买后，您将收到包含许可证密钥的邮件。请在下方输入密钥激活 Pro 功能。
              </div>
              <div class="license-row">
                <input id="licenseInput" placeholder="例如：XXXX-XXXX-XXXX-XXXX" />
                <button class="btn btn-primary" id="activateLicenseBtn">激活</button>
              </div>
              <div class="license-help-link" style="margin-top:8px;text-align:center;">
                <a href="#" id="purchaseLink" style="color:#3d7eff;font-size:13px;text-decoration:none;">还没有许可证？立即购买 →</a>
              </div>
            </div>
            <!-- 已激活时：显示密钥+停用按钮 -->
            <div id="licenseActiveArea" style="display:none;">
              <div class="license-active-info">
                <span class="key-display" id="licenseKeyDisplay"></span>
                <button class="btn btn-danger" id="deactivateLicenseBtn" style="padding:6px 14px;font-size:13px;">停用</button>
              </div>
            </div>
            <div class="license-feedback" id="licenseFeedback"></div>
          </div>

          <div class="setting-group-title">数据导出</div>
          <button class="btn-action primary" id="exportReportBtn">导出 PDF 周报<span class="pro-badge">PRO</span></button>
        </div>
      </div>
    </div>

    <!-- Pro 功能锁定弹窗 -->
    <div class="pro-modal-overlay" id="proModal">
      <div class="pro-modal">
        <div class="pro-icon">&#128274;</div>
        <div class="pro-title">Pro 专属功能</div>
        <div class="pro-feature-name" id="proFeatureName"></div>
        <div class="pro-actions">
          <button class="btn btn-primary" id="proGetBtn" style="width:100%;">获取 FocusGuard Pro</button>
          <button class="btn btn-secondary" id="proCloseBtn" style="width:100%;">关闭</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
